version: '3.8'

services:
  web:
    build: .
    container_name: rental_management_system
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Configure the DB to be stored in the mounted volume folder
      - DATABASE_URL=file:/app/data/sqlite.db
    volumes:
      # Map the local `./data` folder to the container's `/app/data` folder
      # This guarantees your SQLite database persists across container updates/restarts
      - ./data:/app/data
